name: Auto Update Configs

on:
  schedule:
    - cron: '0 * * * *'  # Каждый час (00 минут каждого часа)
  workflow_dispatch:     # Позволяет запускать вручную кнопкой в Actions

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install libs
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4   # Добавь сюда telethon, aiohttp и т.д. если нужно для TG/парсинга

      - name: Run your update script
        run: python scripts/update_configs.py

      - name: Commit changes if files updated
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Автообновление конфигов $(date +"%Y-%m-%d %H:%M")
          file_pattern: configs.txt version.txt   # Добавь сюда все файлы, которые меняет скрипт (через пробел)
