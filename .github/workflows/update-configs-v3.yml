name: Update Configs V3

on:
  schedule:
    - cron: '0 */4 * * *'    # каждые 4 часа
  workflow_dispatch:

permissions:
  contents: write            # ← ЭТО САМОЕ ВАЖНОЕ ИСПРАВЛЕНИЕ

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run update script for V3
        run: python scripts/update_configs.py     # убрал --version v3, потому что он у тебя не работал

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add NEW_config_v3.txt configs.txt version_v3.txt   # добавил все файлы, которые могут меняться
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto update configs + NEW_config_v3.txt $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          fi
