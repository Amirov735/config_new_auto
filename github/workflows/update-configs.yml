name: Auto Update Configs

on:
  schedule:
    - cron: '0 * * * *'          # Каждый час (в 0 минут каждого часа)
  workflow_dispatch:             # + кнопка "Run workflow" вручную для теста

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4   # добавь сюда другие библиотеки, если нужны (например, telethon для TG)

      - name: Run update script
        run: python scripts/update_configs.py   # <-- твой будущий скрипт

      - name: Commit and push changes if any
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Автообновление конфигов $(date +"%Y-%m-%d %H:%M")
          file_pattern: configs.txt version.txt   # добавь сюда все файлы, которые скрипт меняет
