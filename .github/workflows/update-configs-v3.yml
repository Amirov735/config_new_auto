name: Update Configs V3

on:
  schedule:
    - cron: '0 */4 * * *'  # каждые 4 часа (можно поменять)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run update script for V3
        run: python scripts/update_configs.py --version v3   # или путь к твоему скрипту

      - name: Commit and push
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add NEW_config_v3.txt
          git commit -m "Auto update NEW_config_v3.txt" || echo "No changes"
          git push
