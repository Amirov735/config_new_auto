name: Auto Update Configs

permissions:
 contents: write

on:
  schedule:
    - cron: '0 */3 * * *' #00:00, 03:00, 06:00, 09:00 ...UTC
  workflow_dispatch: #оставь чтобы можно было запускать вручную

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install requests
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run script
        run: python scripts/update_configs.py

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Автообновление конфигов $(date +"%Y-%m-%d %H:%M")
          file_pattern: configs.txt version.txt
          tagging_message: ''           # ← убирает предупреждение про тег
          skip_dirty_check: true        # ← убирает проверку "dirty" и лишние warnings
